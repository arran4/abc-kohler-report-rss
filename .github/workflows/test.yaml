name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Build
      run: go build -v ./...
    - name: Vet
      run: go vet -v ./...
    - name: Test
      run: go test -v ./...
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
